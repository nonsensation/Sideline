<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap');

html, body {
    background-color:#181818;
    font-family: 'Quicksand', sans-serif;
    color: white;
    height: 100vh;
    margin: 0;
    width: 100%;
    overflow: hidden;
}

.field {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
    background-image: url(field.svg);
    background-repeat: no-repeat;
    background-position: center;
    background-size: 70%;
    transform: rotate(45deg);
    filter: opacity(1.5%);
}

.idx-container {
    align-items: center;
    justify-content: center;
    height: 100vh;
    display: flex;
    position: relative;
}

.idx-content {
    text-align: center;
}

.idx-links > a {
    color: white;
    padding: 10px 20px;
    font-size: 1.5vmax;
    font-weight: bold;
    letter-spacing: 5rem;
    display: inline-block;
}

h1.idx-title {
    font-size: 15vw;
    font-weight: 300;
    letter-spacing: 3rem;
    margin-bottom: 30px;
    text-decoration: none;
}

h2.idx-title {
    font-size: 3vw;
    font-weight: 300;
    letter-spacing: 1rem;
    margin-bottom: 40px;
    text-decoration: none;
}

</head>
